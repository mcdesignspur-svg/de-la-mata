<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>De La Mata — Print</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  html, body { background: #f0eee9; margin: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: #1A1F1A;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .page {
    width: 100%;
    min-height: 100vh;
    padding: 40px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    break-after: page;
    page-break-after: always;
  }
  .page:last-child { break-after: auto; page-break-after: auto; }
  .page-head {
    width: 100%;
    max-width: 900px;
    margin-bottom: 28px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 1px solid rgba(34,90,64,0.15);
    padding-bottom: 14px;
  }
  .page-head .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #6b7a6b;
  }
  .page-head .title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px;
    font-weight: 500;
    color: #1A1F1A;
  }
  .page-head .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #225A40;
  }
  .artboard-wrap {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    flex: 1;
  }
  .cover-page { padding: 0; }
  .cover-page .artboard-wrap { width: 100%; height: 100vh; }
  .cover-page .cover-inner { width: 100%; height: 100%; }

  @page {
    size: A4 portrait;
    margin: 0;
  }
  @media print {
    .page {
      padding: 20px 30px;
      min-height: auto;
      height: 100vh;
    }
    .cover-page { padding: 0; }
  }

  /* Hide all DesignCanvas pan/zoom interactions */
  .print-artboard {
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    border-radius: 4px;
    overflow: hidden;
  }

  /* System page */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    width: 100%;
    max-width: 900px;
  }
  .swatch-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .swatch { text-align: left; }
  .swatch .chip {
    height: 72px;
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.06);
    margin-bottom: 6px;
    background: transparent;
    padding: 0;
    display: block;
    width: 100%;
  }
  .swatch .name { font-size: 11px; font-weight: 600; }
  .swatch .hex { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #6b7a6b; }

  .type-sample {
    background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 10px;
    border: 1px solid rgba(34,90,64,0.08);
  }
  .type-sample .caption {
    font-size: 11px; color: #6b7a6b; margin-top: 8px;
  }

  .notes-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    width: 100%;
    max-width: 900px;
  }
  .note-card {
    background: #fff;
    padding: 16px;
    border-radius: 12px;
    border: 1px solid rgba(34,90,64,0.08);
    border-left: 3px solid #B8623A;
  }
  .note-card .t { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .note-card .d { font-size: 12px; color: #3d4a3d; line-height: 1.5; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="frames/ios-frame.jsx"></script>
<script type="text/babel" src="screens/primitives.jsx"></script>
<script type="text/babel" src="screens/home.jsx"></script>
<script type="text/babel" src="screens/farm.jsx"></script>
<script type="text/babel" src="screens/cajita.jsx"></script>
<script type="text/babel" src="screens/checkout.jsx"></script>
<script type="text/babel" src="screens/agricultor.jsx"></script>
<script type="text/babel" src="screens/mapa.jsx"></script>

<script type="text/babel">
function PageHead({ label, title, num }) {
  return (
    <div className="page-head">
      <div>
        <div className="label">{label}</div>
        <div className="title">{title}</div>
      </div>
      <div className="num">{num}</div>
    </div>
  );
}

function Cover() {
  return (
    <div className="page cover-page">
      <div className="artboard-wrap">
        <div className="cover-inner" style={{
          background: '#225A40', color: '#F7F1E3', padding: 80,
          display: 'flex', flexDirection: 'column', position: 'relative', overflow: 'hidden',
          boxSizing: 'border-box',
        }}>
          <div style={{ position: 'absolute', right: -80, top: -80, opacity: 0.1 }}>
            <LeafMark size={480} color="#F7F1E3"/>
          </div>
          <div style={{ position: 'absolute', left: -60, bottom: -60, opacity: 0.06 }}>
            <LeafMark size={320} color="#E8A33D"/>
          </div>

          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <LeafMark size={32} color="#F7F1E3"/>
            <span className="mono" style={{ fontSize: 12, letterSpacing: '0.18em', textTransform: 'uppercase', color: '#E8A33D' }}>
              Rough · v0.1 · Abril 2026
            </span>
          </div>

          <div style={{ marginTop: 'auto', position: 'relative' }}>
            <div className="serif" style={{ fontSize: 120, lineHeight: 0.95, fontWeight: 500, letterSpacing: '-0.03em', color: '#F7F1E3' }}>
              De La<br/>Mata.
            </div>
            <div style={{ height: 1, background: 'rgba(247,241,227,0.2)', margin: '40px 0 28px' }}/>
            <div className="serif" style={{ fontSize: 26, lineHeight: 1.3, color: 'rgba(247,241,227,0.85)', fontWeight: 400, maxWidth: 640 }}>
              Marketplace agrícola directo de Puerto Rico — del surco a la mesa, sin intermediarios.
            </div>
            <div style={{
              marginTop: 36, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20,
              fontSize: 13, color: 'rgba(247,241,227,0.75)', maxWidth: 720,
            }}>
              <div>
                <div className="mono" style={{ fontSize: 10, letterSpacing: '0.15em', color: '#E8A33D', marginBottom: 5 }}>PROBLEMA</div>
                85% de alimentos importados · 33.2% de inseguridad alimentaria
              </div>
              <div>
                <div className="mono" style={{ fontSize: 10, letterSpacing: '0.15em', color: '#E8A33D', marginBottom: 5 }}>APUESTA</div>
                ATH Móvil · sincronización offline · recogido comunitario
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function SystemPage() {
  const swatches = [
    ['#4C9D2F', 'Cosecha', 'primary'],
    ['#225A40', 'Savia', 'deep'],
    ['#E8A33D', 'Maduro', 'accent'],
    ['#B8623A', 'Tierra', 'warm'],
    ['#F7F1E3', 'Crema', 'surface'],
    ['#FBF8F1', 'Hueso', 'bg'],
    ['#1A1F1A', 'Tinta', 'ink'],
    ['#6b7a6b', 'Musgo', 'muted'],
  ];
  return (
    <div className="page">
      <PageHead label="Sistema" title="Paleta + tipografía" num="01 / 09"/>
      <div className="two-col">
        <div>
          <div className="eyebrow" style={{ marginBottom: 10 }}>Paleta</div>
          <div className="swatch-grid">
            {swatches.map(([c, n, r]) => (
              <div className="swatch" key={c}>
                <div className="chip" style={{ background: c }}/>
                <div className="name">{n}</div>
                <div className="hex">{c} · {r}</div>
              </div>
            ))}
          </div>

          <div style={{ marginTop: 24 }}>
            <div className="eyebrow" style={{ marginBottom: 8 }}>Principios</div>
            <ul style={{ paddingLeft: 18, margin: 0, fontSize: 13, color: '#3d4a3d', lineHeight: 1.7 }}>
              <li>Confianza por transparencia — cada producto cita su finca.</li>
              <li>Offline-first para el campo; el móvil sincroniza cuando puede.</li>
              <li>ATH Móvil como pago default, nada de fricción nueva.</li>
            </ul>
          </div>
        </div>

        <div>
          <div className="eyebrow" style={{ marginBottom: 10 }}>Tipografía</div>
          <div className="type-sample">
            <div className="serif" style={{ fontSize: 42, lineHeight: 1, fontWeight: 500, color: '#225A40' }}>
              Fresco de la mata.
            </div>
            <div className="caption">Fraunces · headlines + números</div>
          </div>
          <div className="type-sample">
            <div style={{ fontSize: 16, fontWeight: 500 }}>
              Aguacate criollo cortado hoy a las 6am en Hacienda Los Robles.
            </div>
            <div className="caption">Inter · body + UI</div>
          </div>
          <div className="type-sample">
            <div className="mono" style={{ fontSize: 13, color: '#225A40', letterSpacing: '0.08em' }}>
              PR-10427 · BONAFIDE · 2026
            </div>
            <div className="caption">JetBrains Mono · metadata / tags</div>
          </div>
        </div>
      </div>
    </div>
  );
}

function ScreenPage({ label, title, num, children }) {
  return (
    <div className="page">
      <PageHead label={label} title={title} num={num}/>
      <div className="artboard-wrap">
        <div className="print-artboard">
          {children}
        </div>
      </div>
    </div>
  );
}

function NotesPage() {
  const notes = [
    { t: 'Onboarding Bonafide', d: '¿Registro manual via Ley 12-2026 (lento pero seguro) o auto-validamos con número de agricultor y confirmamos después?' },
    { t: 'Modelo de riesgo CSA', d: 'Si la cosecha falla por huracán, ¿cómo se comparte el riesgo? Crédito rollover, sustitución entre fincas, o subsidio con fondos de la app.' },
    { t: 'Densidad del home', d: 'Hoy el home pesa en producto individual. Alternativa: comenzar por finca, no por producto. Explorar en v0.2.' },
    { t: 'Logística última milla', d: 'Primera versión: solo recogido comunitario (iglesias, centros). Home delivery llega cuando haya ruta óptima.' },
  ];
  return (
    <div className="page">
      <PageHead label="Decisiones" title="Qué nos falta amarrar" num="09 / 09"/>
      <div className="notes-grid">
        {notes.map((n, i) => (
          <div className="note-card" key={i}>
            <div className="t">{n.t}</div>
            <div className="d">{n.d}</div>
          </div>
        ))}
      </div>
      <div style={{
        marginTop: 20, padding: 18, background: '#225A40', borderRadius: 12,
        color: '#F7F1E3', maxWidth: 900, width: '100%', boxSizing: 'border-box',
      }}>
        <div className="mono" style={{ fontSize: 10, letterSpacing: '0.12em', color: '#E8A33D' }}>NORTE</div>
        <div style={{ fontSize: 14, lineHeight: 1.5, marginTop: 4 }}>
          Si cada hogar consume $1 diario en local → $1.4M recuperados + 7,300 empleos rurales.
        </div>
      </div>
    </div>
  );
}

function App() {
  return (
    <>
      <Cover/>
      <SystemPage/>
      <ScreenPage label="Flujo consumidor" title="Mercado" num="03 / 09">
        <ScreenHome/>
      </ScreenPage>
      <ScreenPage label="Flujo consumidor" title="Perfil de finca" num="04 / 09">
        <ScreenFarm/>
      </ScreenPage>
      <ScreenPage label="Flujo consumidor" title="Cajita Local (CSA)" num="05 / 09">
        <ScreenCajita/>
      </ScreenPage>
      <ScreenPage label="Flujo consumidor" title="Mapa · recogido" num="06 / 09">
        <ScreenMapa/>
      </ScreenPage>
      <ScreenPage label="Flujo consumidor" title="Checkout · ATH Móvil" num="07 / 09">
        <ScreenCheckout/>
      </ScreenPage>
      <ScreenPage label="Flujo agricultor" title="Módulo offline-first" num="08 / 09">
        <ScreenAgricultor/>
      </ScreenPage>
      <NotesPage/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// Auto-print once fonts + JSX are ready
(async function setupAutoPrint() {
  try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch (e) {}
  await new Promise(r => setTimeout(r, 700));
  window.print();
})();
</script>
</body>
</html>
